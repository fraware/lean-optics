name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fraware/lean-optics

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Lean 4
        uses: leanprover/lean4-action@v1
        with:
          lean_version: 4.8.0

      - name: Cache Lake dependencies
        uses: actions/cache@v3
        with:
          path: .lake/packages
          key: lake-packages-${{ hashFiles('Lakefile.lean', 'lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            lake-packages-

      - name: Install dependencies
        run: lake build

      - name: Placeholder and stub scan
        run: |
          chmod +x scripts/ci/check_placeholders.sh
          ./scripts/ci/check_placeholders.sh

      - name: Determinism check
        run: |
          chmod +x scripts/ci/check_determinism.sh
          ./scripts/ci/check_determinism.sh

      - name: Run tests
        run: make test

      - name: Run benchmarks
        run: |
          make bench | tee bench.out
          rg -q "operations" bench.out

      - name: Generate documentation
        run: make docs

  security:
    name: Security and SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Secrets scan
        uses: gitleaks/gitleaks-action@v2

      - name: Build local image for scanning
        run: docker build -t lean-optics:ci .

      - name: Container scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: lean-optics:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: lean-optics:ci
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [quality, security]
    if: github.event_name == 'push' || github.event_name == 'release'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-test:
    name: Test Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: docker-build
    if: github.event_name == 'push' || github.event_name == 'release'

    steps:
      - name: Test Docker image
        run: |
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest help
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest version
          docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest info

  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality, security, docker-build, docker-test]
    if: github.event_name == 'release'

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign container image
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}

      - name: Create Release Notes
        run: |
          echo "## Lean Optics Release ${{ github.event.release.tag_name }}" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Docker Image" >> release_notes.md
          echo "\`\`\`bash" >> release_notes.md
          echo "docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.release.tag_name }}" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Installation" >> release_notes.md
          echo "Add to your \`lakefile.lean\`:" >> release_notes.md
          echo "\`\`\`lean" >> release_notes.md
          echo "require lean-optics from git" >> release_notes.md
          echo "  \"https://github.com/fraware/lean-optics.git\" @ \"${{ github.event.release.tag_name }}\"" >> release_notes.md
          echo "\`\`\`" >> release_notes.md

      - name: Update Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: |
            release_notes.md
